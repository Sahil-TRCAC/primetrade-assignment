<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskManager</title>

<style>
/* RESET */
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family: 'Segoe UI', system-ui;
  background: linear-gradient(135deg,#eef2ff,#f8fafc);
  color:#1e293b;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 30px;
  background:linear-gradient(135deg,#4f46e5,#6366f1);
  color:white;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.header h1{font-size:22px}

.header-right{
  display:flex;
  gap:12px;
  align-items:center;
}

.badge{
  background:#22c55e;
  padding:4px 10px;
  border-radius:12px;
  font-size:12px;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:auto;
  padding:30px 16px;
}

/* AUTH */
.auth-card{
  max-width:400px;
  margin:auto;
  background:white;
  padding:30px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* TABS */
.tabs{display:flex;margin-bottom:20px}
.tab{
  flex:1;
  padding:10px;
  border:none;
  background:#e5e7eb;
  cursor:pointer;
}
.tab.active{
  background:#4f46e5;
  color:white;
}

/* INPUTS */
input,textarea,select{
  width:100%;
  padding:10px;
  margin-bottom:12px;
  border-radius:8px;
  border:1px solid #ccc;
}

/* BUTTONS */
button{
  border:none;
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
}
.btn-primary{
  background:#4f46e5;
  color:white;
}
.full{width:100%}

/* DASHBOARD */
.card{
  background:white;
  padding:20px;
  border-radius:14px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.top-bar{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

/* TASK LIST */
.task-list{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.task-item{
  display:flex;
  justify-content:space-between;
  background:#f9fafb;
  padding:12px;
  border-radius:10px;
}

/* EMPTY */
.empty-state{
  text-align:center;
  padding:30px;
  color:#9ca3af;
}

/* MODAL */
.modal-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  justify-content:center;
  align-items:center;
}
.modal-overlay.open{display:flex}
.modal{
  background:white;
  padding:20px;
  border-radius:12px;
  width:350px;
}


/* RESPONSIVE */
@media(max-width:600px){
  .top-bar{flex-direction:column;gap:10px}
}
</style>

</head>

<body>

<header class="header">
  <h1>⚡ TaskManager</h1>
  <div class="header-right" id="header-user" style="display:none">
    <span id="header-username"></span>
    <span id="header-role" class="badge"></span>
    <button onclick="logout()">Logout</button>
  </div>
</header>

<!-- AUTH -->

<div class="container" id="auth-section">
  <div class="auth-card">
    <div class="tabs">
    <button id="loginTab" class="tab active" onclick="switchTab('login')">Login</button>
<button id="registerTab" class="tab" onclick="switchTab('register')">Register</button>
    </div>

<div id="loginForm">
  <input id="login-email" placeholder="Email">
  <input id="login-password" type="password" placeholder="Password">
  <button class="btn-primary full" onclick="login()">Login</button>
</div>

<div id="registerForm" style="display:none">
  <input id="reg-username" placeholder="Username">
  <input id="reg-email" placeholder="Email">
  <input id="reg-password" type="password" placeholder="Password">
  <button class="btn-primary full" onclick="register()">Create Account</button>
</div>

  </div>
</div>

<!-- DASHBOARD -->

<div class="container" id="dashboard" style="display:none">
  <div class="card">
    <div class="top-bar">
      <h2>My Tasks</h2>
      <button class="btn-primary" onclick="openCreateModal()">+ New Task</button>
    </div>
    <div id="task-list" class="task-list"></div>
  </div>
</div>

<!-- MODAL -->

<div id="task-modal" class="modal-overlay">
  <div class="modal">
    <h3>New Task</h3>
    <input id="modal-task-title" placeholder="Title">
    <textarea id="modal-task-desc" placeholder="Description"></textarea>
    <button class="btn-primary" onclick="saveTask()">Save</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
const API="http://localhost:5000/api/v1";
let token=null;
let currentUser=null;

document.addEventListener("DOMContentLoaded",()=>{
  token=localStorage.getItem("token");
  currentUser=JSON.parse(localStorage.getItem("user")||"null");
  if(token && currentUser) showDashboard();
});

function switchTab(tab) {
  console.log("Switching to:", tab); // DEBUG

  const loginTab = document.getElementById("loginTab");
  const registerTab = document.getElementById("registerTab");

  const loginForm = document.getElementById("loginForm");
  const registerForm = document.getElementById("registerForm");

  if (!loginTab || !registerTab || !loginForm || !registerForm) {
    console.error("Missing elements");
    return;
  }

  if (tab === "login") {
    loginForm.style.display = "block";
    registerForm.style.display = "none";

    loginTab.classList.add("active");
    registerTab.classList.remove("active");
  } else {
    loginForm.style.display = "none";
    registerForm.style.display = "block";

    registerTab.classList.add("active");
    loginTab.classList.remove("active");
  }
}

async function register(){
  const username=document.getElementById("reg-username").value;
  const email=document.getElementById("reg-email").value;
  const password=document.getElementById("reg-password").value;

  const res=await fetch(API+"/auth/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username,email,password})
  });

  const data=await res.json();

  if(data.status!=="success"){alert(data.message);return;}

  alert("Account created");
  switchTab("login");
}

function showDashboard(){
  document.getElementById("auth-section").style.display="none";
  document.getElementById("dashboard").style.display="block";
  document.getElementById("header-user").style.display="flex";

  document.getElementById("header-username").textContent=currentUser.username;
  document.getElementById("header-role").textContent=currentUser.role;

  loadTasks();
}

async function loadTasks(){
  const res=await fetch(API+"/tasks",{headers:{Authorization:"Bearer "+token}});
  const data=await res.json();

  const list=document.getElementById("task-list");

  if(!data.data.length){
    list.innerHTML="<div class='empty-state'>No tasks yet</div>";
    return;
  }

  list.innerHTML=data.data.map(t=>`
    <div class="task-item">
      <span>${t.title}</span>
      <button onclick="deleteTask(${t.id})">Delete</button>
    </div>
  `).join("");
}

function openCreateModal(){
  document.getElementById("task-modal").classList.add("open");
}
function closeModal(){
  document.getElementById("task-modal").classList.remove("open");
}

async function saveTask(){
  const title=document.getElementById("modal-task-title").value;

  await fetch(API+"/tasks",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+token
    },
    body:JSON.stringify({title})
  });

  closeModal();
  loadTasks();
}

async function deleteTask(id){
  await fetch(API+"/tasks/"+id,{
    method:"DELETE",
    headers:{Authorization:"Bearer "+token}
  });
  loadTasks();
}

function logout(){
  localStorage.clear();
  location.reload();
}
</script>

</body>
</html>
